spring.application.name=comemyway
spring.messages.encoding=UTF-8

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pet_heartbeat_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.config.import=optional:file:.env[.properties]

jwt.secret=${JWT_SECRET}
jwt.access.expiration=${JWT_ACCESS_EXPIRATION}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION}

security.swagger-endpoints=/swagger-ui/**,/v3/api-docs/**,/swagger-ui.html
security.public-endpoints=/api/v1/auth/**
security.user-endpoints=/api/v1/user/**
security.clinic-endpoints=/api/v1/clinic/**
security.admin-endpoints=/api/v1/admin/**

# Thong tin may chu gmail
spring.mail.host=smtp.gmail.com
spring.mail.port=587

# Tai khoan dung de gui OTP
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# Configurer of Google
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# --- REDIS CONFIGURATION ---
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# Turn on SSL because Upstash require security
spring.data.redis.ssl.enabled=true