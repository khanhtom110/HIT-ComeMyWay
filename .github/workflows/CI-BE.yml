name: CI
on:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - dev
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Validate Code Formatting
        run: mvn -T 2C --batch-mode formatter:validate

      - name: Build and Test
        run: mvn -T 2C --batch-mode verify